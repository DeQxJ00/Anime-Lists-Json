name: Update static AniDB JSON API

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: write

concurrency:
  group: update-static-anidb-api
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check whether upstream file changed
        id: upstream
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          mkdir -p .source
          curl --fail --location --retry 3 \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GITHUB_TOKEN}" \
            --output .source/upstream-commits.json \
            "https://api.github.com/repos/Anime-Lists/anime-lists/commits?path=anime-list-master.xml&per_page=1"
          python3 -c "import json; print(json.load(open('.source/upstream-commits.json', encoding='utf-8'))[0]['sha'])" > .source/anime-list-master.commit.new
          rm .source/upstream-commits.json
          if [ -f .source/anime-list-master.commit ] && cmp -s .source/anime-list-master.commit .source/anime-list-master.commit.new; then
            rm .source/anime-list-master.commit.new
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Upstream anime-list-master.xml commit is unchanged. Skipping download and rebuild."
            exit 0
          fi
          mv .source/anime-list-master.commit.new .source/anime-list-master.commit
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Download latest anime-list-master.xml
        if: steps.upstream.outputs.changed == 'true'
        run: |
          curl --fail --location --retry 3 \
            --output anime-list-master.xml \
            https://raw.githubusercontent.com/Anime-Lists/anime-lists/master/anime-list-master.xml

      - name: Rebuild static JSON files
        if: steps.upstream.outputs.changed == 'true'
        run: python3 tools/build_static_api.py --xml anime-list-master.xml --out .

      - name: Remove downloaded XML
        if: steps.upstream.outputs.changed == 'true'
        run: rm anime-list-master.xml

      - name: Commit changes
        if: steps.upstream.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin "${GITHUB_REF_NAME:-main}"
          git add .source/anime-list-master.commit
          git add api/anidb
          git add api/imdb
          if [ -f duplicate-anidbids.json ]; then
            git add duplicate-anidbids.json
          fi
          if git diff --cached --quiet; then
            echo "No JSON changes to commit."
            exit 0
          fi
          git commit -m "Update static AniDB JSON API"
          git push
